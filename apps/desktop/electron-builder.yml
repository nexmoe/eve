appId: build.nexmoe.eve.desktop
productName: eve
directories:
  buildResources: build
files:
  - '!**/*.map'
  - '!**/__pycache__/**'
  - '!.generated/**'
  - '!dist/**'
  - '!node_modules/**'
  - '!scripts/**'
  - '!src/**'
  - '!vendor/**'
  - '!tsconfig*.json'
  - '!vitest.config.ts'
  - '!electron.vite.config.ts'
asar:
  smartUnpack: false
asarUnpack:
  - resources/**
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - '**/*'
  - from: .generated/shared-python-runtime
    to: vendor/shared-python-runtime
    filter:
      - '**/*'
      - '!**/__pycache__/**'
      - '!**/docs/**'
      - '!**/*.pyc'
      - '!**/*.pyo'
      - '!**/test/**'
      - '!**/tests/**'
      - '!python/**/ensurepip/**'
      - '!python/**/idlelib/**'
      - '!python/**/tkinter/**'
      - '!python/**/turtledemo/**'
      - '!python/**/site-packages/pip/**'
      - '!python/**/site-packages/pip-*.dist-info/**'
      - '!python/**/site-packages/setuptools/**'
      - '!python/**/site-packages/setuptools-*.dist-info/**'
      - '!runtime/**/fastapi/**'
      - '!runtime/**/fastapi-*.dist-info/**'
      - '!runtime/**/flask/**'
      - '!runtime/**/flask-*.dist-info/**'
      - '!runtime/**/gradio/**'
      - '!runtime/**/gradio-*.dist-info/**'
      - '!runtime/**/gradio_client/**'
      - '!runtime/**/gradio_client-*.dist-info/**'
      - '!runtime/**/pip/**'
      - '!runtime/**/pip-*.dist-info/**'
      - '!runtime/**/setuptools/**'
      - '!runtime/**/setuptools-*.dist-info/**'
      - '!runtime/**/uvicorn/**'
      - '!runtime/**/uvicorn-*.dist-info/**'
      - '!runtime/**/werkzeug/**'
      - '!runtime/**/werkzeug-*.dist-info/**'
      - '!runtime/Lib/site-packages/qwen_asr/cli/**'
      - '!runtime/lib/python3.12/site-packages/qwen_asr/cli/**'
      - '!runtime/Lib/site-packages/torch/include/**'
      - '!runtime/lib/python3.12/site-packages/torch/include/**'
      - '!runtime/Lib/site-packages/torch/share/**'
      - '!runtime/lib/python3.12/site-packages/torch/share/**'
  - from: vendor/eve-sidecar
    to: vendor/eve-sidecar
    filter:
      - '**/*'
      - '!**/__pycache__/**'
      - '!**/*.pyc'
      - '!**/*.pyo'
mac:
  artifactName: ${productName}-${version}-installer.${ext}
  category: public.app-category.productivity
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  sign: ./scripts/macos-sign.cjs
  icon: resources/icon.icns
  notarize: true
  target:
    - target: dmg
    - target: zip
    - target: pkg
  extendInfo:
    - CFBundleDisplayName: eve
    - CFBundleName: eve
    - LSUIElement: true
    - NSMicrophoneUsageDescription: eve 需要麦克风权限来完成长时录音与实时转写。
pkg:
  allowAnywhere: false
  allowCurrentUserHome: false
  allowRootDirectory: true
  artifactName: ${productName}-${version}-installer.${ext}
  installLocation: /Applications
win:
  executableName: eve
  icon: resources/icon.ico
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  createDesktopShortcut: always
  oneClick: false
  perMachine: false
  shortcutName: eve
  uninstallDisplayName: eve
npmRebuild: false
publish:
  - provider: github
    owner: nexmoe
    repo: eve
