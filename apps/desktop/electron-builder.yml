appId: build.nexmoe.eve.desktop
productName: Eve Recorder
directories:
  buildResources: build
files:
  - '!**/*.map'
  - '!**/__pycache__/**'
  - '!.generated/**'
  - '!dist/**'
  - '!node_modules/**'
  - '!scripts/**'
  - '!src/**'
  - '!vendor/**'
  - '!tsconfig*.json'
  - '!vitest.config.ts'
  - '!electron.vite.config.ts'
asar:
  smartUnpack: false
asarUnpack:
  - node_modules/**/*.node
  - node_modules/sherpa-onnx-*/**/*
  - node_modules/sherpa-onnx-node/**/*
extraResources:
  - from: .generated/sherpa-runtime
    to: vendor/sherpa-runtime
    filter:
      - "**/*"
  - from: vendor/ffmpeg
    to: vendor/ffmpeg
    filter:
      - "**/*"
mac:
  artifactName: ${productName}-${version}-installer.${ext}
  category: public.app-category.productivity
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  sign: ./scripts/macos-sign.cjs
  icon: resources/icon.icns
  notarize: true
  target:
    - target: dmg
    - target: zip
  extendInfo:
    - CFBundleDisplayName: Eve Recorder
    - CFBundleName: Eve Recorder
    - LSUIElement: true
    - NSCameraUseContinuityCameraDeviceType: true
    - NSMicrophoneUsageDescription: Eve Recorder 需要麦克风权限来完成长时录音与实时转写。
win:
  executableName: Eve Recorder
  icon: resources/icon.ico
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  createDesktopShortcut: always
  oneClick: false
  perMachine: false
  shortcutName: Eve Recorder
  uninstallDisplayName: Eve Recorder
npmRebuild: false
electronLanguages:
  - en
publish:
  - provider: github
    owner: nexmoe
    repo: eve
